<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cost Estimator — Professional Construction Costing</title>
  <script src="js/auth.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,600;1,400;1,600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a09;
      --s1: #111110;
      --s2: #181816;
      --s3: #212120;
      --gold: #c8a84b;
      --gold2: #e8c96a;
      --text: #e8e6de;
      --muted: #6a6860;
      --muted2: #9a9890;
      --green: #4a9b6a;
      --border: rgba(255, 255, 255, 0.07);
      --body: 'Sora', sans-serif;
      --head: 'Playfair Display', serif;
      --mono: 'DM Mono', monospace;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--body); font-size: 13px; line-height: 1.6; }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: rgba(10, 10, 9, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    .topbar-logo { font-family: var(--head); font-size: 18px; font-style: italic; color: var(--gold); }
    .topbar-right { display: flex; gap: 12px; align-items: center; }
    .topbar-btn { background: none; border: 1px solid var(--border); color: var(--muted2); padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .topbar-btn:hover { border-color: var(--gold); color: var(--gold); }

    .main {
      padding-top: 56px;
      padding: 28px 32px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .page-title { font-size: 24px; font-weight: 600; color: var(--text); margin-bottom: 4px; font-family: var(--head); }
    .page-subtitle { font-size: 12px; color: var(--muted2); margin-bottom: 24px; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
    .form-input { background: var(--s2); border: 1px solid var(--border); color: var(--text); font-family: var(--body); font-size: 12px; padding: 9px 12px; border-radius: 6px; }
    .form-input:focus { outline: none; border-color: var(--gold); background: var(--s3); }

    .btn { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 10px 18px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
    .btn-primary { background: var(--gold); color: #0a0a09; }
    .btn-primary:hover { background: var(--gold2); }

    .results-box { background: var(--s2); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-top: 24px; }
    .results-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 16px; }

    @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">SiteCalc Pro <span style="font-size: 9px; color: var(--muted);">COST</span></div>
  <div class="topbar-right">
    <button class="topbar-btn" onclick="goBack()">← Back to BOQ</button>
    <button class="topbar-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="main">
  <div class="page-title">Cost Estimation</div>
  <div class="page-subtitle">Convert your BOQ into a priced cost estimate</div>

  <div class="form-grid">
    <div class="form-group">
      <label class="form-label">Select BOQ Project *</label>
      <select class="form-input" id="projectSelect" onchange="loadProject()">
        <option value="">— Select project —</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Currency</label>
      <select class="form-input" id="currency">
        <option value="sar">SAR (Saudi Riyal)</option>
        <option value="aed">AED (UAE Dirham)</option>
        <option value="usd">USD (US Dollar)</option>
        <option value="eur">EUR (Euro)</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Labour Rate (per unit) *</label>
      <input type="number" class="form-input" id="labourRate" placeholder="e.g., 150" step="0.01">
    </div>

    <div class="form-group">
      <label class="form-label">Contingency % *</label>
      <input type="number" class="form-input" id="contingency" placeholder="e.g., 10" value="10" min="0" max="100" step="0.5">
    </div>

    <div class="form-group">
      <label class="form-label">VAT / Tax % *</label>
      <input type="number" class="form-input" id="vat" placeholder="e.g., 15" value="15" min="0" max="100" step="0.5">
    </div>

    <div class="form-group">
      <label class="form-label">Mark-up %</label>
      <input type="number" class="form-input" id="markup" placeholder="e.g., 5" value="0" min="0" step="0.5">
    </div>
  </div>

  <div style="display: flex; gap: 8px; margin-top: 24px;">
    <button class="btn btn-primary" onclick="calculateCost()">Calculate Cost Estimate →</button>
  </div>

  <div class="results-box" id="resultsBox" style="display: none;">
    <div class="results-title">💰 Cost Estimate Summary</div>
    <div id="costResults"></div>
  </div>
</div>

<script>
AUTH.requireLogin();

function loadProjectsSelect() {
  const projects = JSON.parse(localStorage.getItem('boq_projects') || '[]');
  const select = document.getElementById('projectSelect');

  projects.forEach(p => {
    const option = document.createElement('option');
    option.value = p.id;
    option.textContent = p.name + ' (' + p.type + ')';
    select.appendChild(option);
  });
}

function loadProject() {
  const projectId = document.getElementById('projectSelect').value;
  const projects = JSON.parse(localStorage.getItem('boq_projects') || '[]');
  const project = projects.find(p => p.id === projectId);

  if (project) {
    console.log('Loaded project:', project);
  }
}

function calculateCost() {
  const projectId = document.getElementById('projectSelect').value;
  if (!projectId) {
    alert('Please select a project');
    return;
  }

  const projects = JSON.parse(localStorage.getItem('boq_projects') || '[]');
  const project = projects.find(p => p.id === projectId);
  if (!project) return;

  const labourRate = parseFloat(document.getElementById('labourRate').value);
  const contingency = parseFloat(document.getElementById('contingency').value) / 100;
  const vat = parseFloat(document.getElementById('vat').value) / 100;
  const markup = parseFloat(document.getElementById('markup').value) / 100;

  if (!labourRate) {
    alert('Please enter labour rate');
    return;
  }

  // Sample cost calculation
  const concreteCost = project.boq.concrete * 500; // sample unit rate
  const rebarCost = project.boq.rebar * 3000;
  const blockCost = project.boq.blockwork * 50;
  const tileCost = project.boq.tiles * 100;
  const plasterCost = project.boq.plaster * 30;
  const paintCost = project.boq.paint * 40;

  const subtotal = concreteCost + rebarCost + blockCost + tileCost + plasterCost + paintCost;
  const contingencyAmount = subtotal * contingency;
  const subtotalWithContingency = subtotal + contingencyAmount;
  const vatAmount = subtotalWithContingency * vat;
  const markupAmount = subtotalWithContingency * markup;
  const total = subtotalWithContingency + vatAmount + markupAmount;

  const costBreakdown = `
    <table style="width: 100%; font-size: 12px;">
      <tr style="border-bottom: 1px solid var(--border);">
        <td style="padding: 8px;">Concrete & Rebar</td>
        <td style="text-align: right; padding: 8px;">SAR ${(concreteCost + rebarCost).toLocaleString()}</td>
      </tr>
      <tr style="border-bottom: 1px solid var(--border);">
        <td style="padding: 8px;">Blockwork & Finishes</td>
        <td style="text-align: right; padding: 8px;">SAR ${(blockCost + tileCost + plasterCost + paintCost).toLocaleString()}</td>
      </tr>
      <tr style="border-bottom: 1px solid var(--border); color: var(--text); font-weight: 600;">
        <td style="padding: 8px;">Subtotal</td>
        <td style="text-align: right; padding: 8px;">SAR ${subtotal.toLocaleString()}</td>
      </tr>
      <tr style="border-bottom: 1px solid var(--border);">
        <td style="padding: 8px;">Contingency (${(contingency * 100).toFixed(1)}%)</td>
        <td style="text-align: right; padding: 8px;">SAR ${contingencyAmount.toLocaleString()}</td>
      </tr>
      <tr style="border-bottom: 1px solid var(--border);">
        <td style="padding: 8px;">VAT / Tax (${(vat * 100).toFixed(1)}%)</td>
        <td style="text-align: right; padding: 8px;">SAR ${vatAmount.toLocaleString()}</td>
      </tr>
      <tr style="background: rgba(200, 168, 75, 0.12); color: var(--gold); font-weight: 600;">
        <td style="padding: 8px;">TOTAL PROJECT COST</td>
        <td style="text-align: right; padding: 8px;">SAR ${total.toLocaleString()}</td>
      </tr>
      <tr>
        <td style="padding: 8px; font-size: 11px; color: var(--muted);">Cost per m²</td>
        <td style="text-align: right; padding: 8px; font-size: 11px; color: var(--muted);">SAR ${(total / project.totalArea).toLocaleString(undefined, {maximumFractionDigits: 0})}</td>
      </tr>
    </table>
  `;

  document.getElementById('costResults').innerHTML = costBreakdown;
  document.getElementById('resultsBox').style.display = 'block';
}

function goBack() {
  window.location.href = 'boq-estimator.html';
}

function logout() {
  if (confirm('Logout?')) {
    AUTH.logout();
    window.location.href = 'index.html';
  }
}

window.addEventListener('DOMContentLoaded', () => {
  loadProjectsSelect();
});
</script>

</body>
</html>
